<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tác vụ Notion — Tự động đăng bài</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/shared/tw-config.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
    <div class="flex min-h-screen">
      <div id="sidebar-backdrop" class="fixed inset-0 z-30 bg-slate-900/40 hidden lg:hidden"></div>
      <aside
        id="sidebar-mount"
        class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full transition-transform duration-200 border-r border-slate-200 bg-white lg:static lg:translate-x-0 lg:shrink-0"
        aria-label="Điều hướng"
      ></aside>

      <div class="flex min-w-0 flex-1 flex-col">
        <header class="sticky top-0 z-20 flex items-center gap-3 border-b border-slate-200 bg-white/90 px-4 py-3 backdrop-blur lg:px-8">
          <button data-sidebar-toggle type="button" class="rounded-lg border border-slate-200 p-2 text-slate-600 hover:bg-slate-100 lg:hidden" aria-label="Mở menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" /></svg>
          </button>
          <div class="min-w-0">
            <h1 class="text-lg font-bold text-slate-900">Tác vụ Notion</h1>
            <p id="task-status" class="text-xs text-slate-500" aria-live="polite">Đang tải...</p>
          </div>
        </header>

        <main class="mx-auto w-full max-w-7xl flex-1 space-y-4 p-4 lg:p-8">
          <!-- Tabs lọc trạng thái -->
          <div id="task-tabs" class="flex flex-wrap gap-2"></div>

          <!-- Tìm kiếm + lọc Page -->
          <div class="flex flex-col gap-3 sm:flex-row">
            <input
              id="task-search"
              type="search"
              placeholder="Tìm theo tiêu đề, Page, nội dung..."
              class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-100"
            />
            <select
              id="task-page-filter"
              class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-100 sm:w-64"
            >
              <option value="all">Tất cả Page</option>
            </select>
          </div>

          <!-- Bảng -->
          <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
            <div class="overflow-x-auto">
              <table class="min-w-full">
                <thead class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                  <tr>
                    <th class="px-4 py-3">Tác vụ</th>
                    <th class="px-4 py-3">Page</th>
                    <th class="px-4 py-3">Lịch đăng</th>
                    <th class="px-4 py-3">Định dạng</th>
                    <th class="px-4 py-3">Trạng thái</th>
                    <th class="px-4 py-3">Lỗi / Lý do</th>
                    <th class="px-4 py-3 text-right">Hành động</th>
                  </tr>
                </thead>
                <tbody id="task-list" class="divide-y divide-slate-100 text-sm"></tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="/tasks.js"></script>
  </body>
</html>
