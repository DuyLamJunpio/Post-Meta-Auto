<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng ký nhận tư vấn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/shared/tw-config.js"></script>
  </head>
  <body class="min-h-screen bg-slate-100 font-sans antialiased">
    <div class="flex min-h-screen items-center justify-center p-4">
      <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
        <div class="mb-6 text-center">
          <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-brand-500 text-xl font-bold text-white">✦</div>
          <h1 class="text-xl font-bold text-slate-900">Đăng ký nhận tư vấn</h1>
          <p class="mt-1 text-sm text-slate-500">Để lại thông tin để đội ngũ của chúng tôi liên hệ hỗ trợ bạn.</p>
        </div>

        <p id="alert" class="mb-4 hidden rounded-lg px-3 py-2 text-sm" aria-live="polite"></p>

        <!-- Bước 1: đăng nhập Facebook -->
        <div id="login-step">
          <a href="/lead/auth/facebook" class="flex w-full items-center justify-center gap-2 rounded-xl bg-brand-500 px-4 py-3 text-sm font-semibold text-white hover:bg-brand-600">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-5 w-5"><path d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"/></svg>
            Đăng nhập bằng Facebook
          </a>
          <p class="mt-3 text-center text-xs text-slate-400">Chúng tôi chỉ lấy tên và email cơ bản để biết bạn là ai. Không đăng bài thay bạn.</p>
        </div>

        <!-- Bước 2: form đăng ký (ẩn cho tới khi đăng nhập) -->
        <form id="lead-form" class="hidden space-y-4">
          <div class="rounded-lg bg-brand-50 px-3 py-2 text-sm text-brand-700">
            Xin chào <strong id="hello-name">bạn</strong> 👋
          </div>

          <label class="block">
            <span class="text-sm font-medium text-slate-700">Họ và tên</span>
            <input id="name" type="text" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="text-sm font-medium text-slate-700">Số điện thoại <span class="text-rose-500">*</span></span>
            <input id="phone" type="tel" inputmode="tel" required placeholder="VD: 0901234567" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="text-sm font-medium text-slate-700">Email</span>
            <input id="email" type="email" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="text-sm font-medium text-slate-700">Nhu cầu / ghi chú</span>
            <textarea id="note" rows="3" placeholder="Bạn đang quan tâm sản phẩm/dịch vụ nào?" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-100"></textarea>
          </label>

          <label class="flex items-start gap-2">
            <input id="consent" type="checkbox" class="mt-0.5 h-4 w-4" />
            <span id="consent-text" class="text-xs leading-relaxed text-slate-500"></span>
          </label>

          <button id="submit-button" type="submit" class="w-full rounded-xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white hover:bg-emerald-700 disabled:opacity-50">
            Gửi đăng ký
          </button>
        </form>

        <!-- Bước 3: thành công -->
        <div id="success-step" class="hidden text-center">
          <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100 text-2xl">✓</div>
          <h2 class="text-lg font-bold text-slate-900">Đã nhận thông tin!</h2>
          <p class="mt-1 text-sm text-slate-500">Cảm ơn bạn. Đội ngũ của chúng tôi sẽ liên hệ sớm.</p>
        </div>
      </div>
    </div>

    <script src="/lead.js"></script>
  </body>
</html>
