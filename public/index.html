<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tự động đăng bài Facebook từ Notion</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/index.js" defer></script>
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-panel">
        <div class="brand-mark">f</div>
        <p class="eyebrow">Notion → Facebook Page</p>
        <h1>Trung tâm đăng bài Facebook</h1>
        <p>Đăng nhập để tiếp tục vào bảng quản trị.</p>
        <a class="button primary wide" href="/auth/facebook">Đăng nhập bằng Facebook</a>
        <p class="muted" id="login-status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
