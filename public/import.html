<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nhập Excel — Tự động đăng bài</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/shared/tw-config.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
    <div class="flex min-h-screen">
      <div id="sidebar-backdrop" class="fixed inset-0 z-30 bg-slate-900/40 hidden lg:hidden"></div>
      <aside
        id="sidebar-mount"
        class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full transition-transform duration-200 border-r border-slate-200 bg-white lg:static lg:translate-x-0 lg:shrink-0"
        aria-label="Điều hướng"
      ></aside>

      <div class="flex min-w-0 flex-1 flex-col">
        <header class="sticky top-0 z-20 flex items-center gap-3 border-b border-slate-200 bg-white/90 px-4 py-3 backdrop-blur lg:px-8">
          <button data-sidebar-toggle type="button" class="rounded-lg border border-slate-200 p-2 text-slate-600 hover:bg-slate-100 lg:hidden" aria-label="Mở menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" /></svg>
          </button>
          <div class="min-w-0">
            <h1 class="text-lg font-bold text-slate-900">Nhập task từ Excel</h1>
            <p class="text-xs text-slate-500">Tải file Excel → kiểm tra hợp lệ → tạo task Notion</p>
          </div>
        </header>

        <main class="mx-auto w-full max-w-7xl flex-1 space-y-6 p-4 lg:p-8">
          <!-- Bước tải file -->
          <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <h2 class="text-sm font-semibold text-slate-900">1. Chọn file Excel</h2>
            <p class="mt-1 text-xs text-slate-500">
              Dùng đúng mẫu <code class="rounded bg-slate-100 px-1">Notion-Task-Import.xlsx</code>. Cột bắt buộc: Post Title, Channel, Brand Code.
            </p>
            <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center">
              <input
                id="file-input"
                type="file"
                accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                class="block w-full text-sm text-slate-600 file:mr-3 file:rounded-lg file:border-0 file:bg-brand-50 file:px-4 file:py-2 file:text-sm file:font-medium file:text-brand-700 hover:file:bg-brand-100 sm:max-w-md"
              />
              <button id="preview-button" type="button" class="rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-50" disabled>
                Kiểm tra dữ liệu
              </button>
            </div>
            <p id="upload-status" class="mt-3 text-sm text-slate-500" aria-live="polite"></p>
          </section>

          <!-- Bước xem trước + kiểm tra -->
          <section id="preview-section" class="hidden rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <h2 class="text-sm font-semibold text-slate-900">2. Xem trước &amp; kiểm tra</h2>
                <p id="preview-summary" class="mt-1 text-xs text-slate-500"></p>
              </div>
              <button id="create-button" type="button" class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700 disabled:opacity-50" disabled>
                Tạo task đã chọn
              </button>
            </div>

            <div class="mt-4 overflow-x-auto">
              <table class="min-w-full">
                <thead class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                  <tr>
                    <th class="px-3 py-3"><input id="select-all" type="checkbox" class="h-4 w-4" /></th>
                    <th class="px-3 py-3">Dòng</th>
                    <th class="px-3 py-3">Tiêu đề</th>
                    <th class="px-3 py-3">Brand</th>
                    <th class="px-3 py-3">Kênh</th>
                    <th class="px-3 py-3">Lịch đăng</th>
                    <th class="px-3 py-3">Kết quả kiểm tra</th>
                  </tr>
                </thead>
                <tbody id="preview-list" class="divide-y divide-slate-100 text-sm"></tbody>
              </table>
            </div>
          </section>

          <!-- Kết quả tạo -->
          <section id="result-section" class="hidden rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <h2 class="text-sm font-semibold text-slate-900">3. Kết quả tạo task</h2>
            <div id="result-list" class="mt-3 space-y-2 text-sm"></div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/import.js"></script>
  </body>
</html>
