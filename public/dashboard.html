<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tổng quan — Tự động đăng bài</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/shared/tw-config.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
    <div class="flex min-h-screen">
      <div id="sidebar-backdrop" class="fixed inset-0 z-30 bg-slate-900/40 hidden lg:hidden"></div>
      <aside
        id="sidebar-mount"
        class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full transition-transform duration-200 border-r border-slate-200 bg-white lg:static lg:translate-x-0 lg:shrink-0"
        aria-label="Điều hướng"
      ></aside>

      <div class="flex min-w-0 flex-1 flex-col">
        <header class="sticky top-0 z-20 flex items-center gap-3 border-b border-slate-200 bg-white/90 px-4 py-3 backdrop-blur lg:px-8">
          <button data-sidebar-toggle type="button" class="rounded-lg border border-slate-200 p-2 text-slate-600 hover:bg-slate-100 lg:hidden" aria-label="Mở menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" /></svg>
          </button>
          <div class="min-w-0 flex-1">
            <h1 class="text-lg font-bold text-slate-900">Tổng quan</h1>
            <p id="overview-user" class="text-xs text-slate-500">Đang tải tài khoản...</p>
          </div>
          <div class="hidden gap-2 sm:flex">
            <button id="publish-due" type="button" class="rounded-lg bg-brand-500 px-3 py-2 text-sm font-medium text-white hover:bg-brand-600">Xử lý đến hạn</button>
            <button id="publish-overdue" type="button" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100">Đăng lại quá hạn</button>
            <button id="retry-failed" type="button" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100">Chuẩn bị lỗi</button>
          </div>
        </header>

        <main class="mx-auto w-full max-w-7xl flex-1 space-y-6 p-4 lg:p-8">
          <p id="overview-status" class="text-sm text-slate-500" aria-live="polite"></p>

          <!-- Chỉ số -->
          <section class="grid grid-cols-2 gap-4 lg:grid-cols-4">
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
              <p class="text-sm text-slate-500">Page quản lý</p>
              <p id="metric-pages" class="mt-1 text-3xl font-bold text-slate-900">—</p>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
              <p class="text-sm text-slate-500">Sẵn sàng vào lịch</p>
              <p id="metric-ready" class="mt-1 text-3xl font-bold text-emerald-600">—</p>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
              <p class="text-sm text-slate-500">Sẵn sàng đăng</p>
              <p id="metric-publish" class="mt-1 text-3xl font-bold text-brand-600">—</p>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
              <p class="text-sm text-slate-500">Quá hạn &lt; 24 giờ</p>
              <p id="metric-overdue" class="mt-1 text-3xl font-bold text-amber-600">—</p>
            </div>
          </section>

          <!-- Hành động nhanh (mobile) -->
          <section class="flex flex-wrap gap-2 sm:hidden">
            <button id="publish-due-m" type="button" class="rounded-lg bg-brand-500 px-3 py-2 text-sm font-medium text-white">Xử lý đến hạn</button>
            <button id="publish-overdue-m" type="button" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600">Đăng lại quá hạn</button>
            <button id="retry-failed-m" type="button" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600">Chuẩn bị lỗi</button>
          </section>

          <!-- Trạng thái kênh -->
          <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-sm font-semibold text-slate-900">Trạng thái kết nối kênh</h2>
              <a href="/settings.html" class="text-sm font-medium text-brand-600 hover:underline">Quản lý →</a>
            </div>
            <div id="channel-status" class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-4"></div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/dashboard.js"></script>
  </body>
</html>
